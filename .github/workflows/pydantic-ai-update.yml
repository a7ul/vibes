name: Pydantic AI Release Watcher

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9am UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force create PR even if version unchanged'
        required: false
        default: 'false'

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch latest pydantic-ai version
        id: fetch-version
        run: |
          LATEST=$(curl -fsSL https://pypi.org/pypi/pydantic-ai/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest pydantic-ai version: $LATEST"

      - name: Read stored version
        id: stored-version
        run: |
          STORED=$(cat .github/pydantic-ai-version.txt | tr -d '[:space:]')
          echo "stored=$STORED" >> "$GITHUB_OUTPUT"
          echo "Stored version: $STORED"

      - name: Check for new release and duplicates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.fetch-version.outputs.latest }}"
          STORED="${{ steps.stored-version.outputs.stored }}"
          FORCE="${{ github.event.inputs.force }}"

          if [[ "$LATEST" == "$STORED" && "$FORCE" != "true" ]]; then
            echo "No new release (still $LATEST). Exiting."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New release detected: $STORED -> $LATEST"

          # Check for existing open PR for this version
          BRANCH="chore/pydantic-ai-update-${LATEST}"
          EXISTING_PR=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${BRANCH}&state=open" \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "$EXISTING_PR" && "$EXISTING_PR" != "null" ]]; then
            echo "PR already exists for v${LATEST}: #${EXISTING_PR} — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Analyze release
        if: steps.check.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD="${{ steps.stored-version.outputs.stored }}"
          NEW="${{ steps.fetch-version.outputs.latest }}"
          chmod +x .github/scripts/analyze-pydantic-release.sh
          .github/scripts/analyze-pydantic-release.sh "$OLD" "$NEW" > /tmp/release-summary.md

      - name: Update version marker and push branch
        if: steps.check.outputs.should_run == 'true'
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD="${{ steps.stored-version.outputs.stored }}"
          NEW="${{ steps.fetch-version.outputs.latest }}"
          BRANCH="chore/pydantic-ai-update-${NEW}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          echo "$NEW" > .github/pydantic-ai-version.txt
          git add .github/pydantic-ai-version.txt
          if git diff --cached --quiet; then
            echo "Version marker already up to date, skipping commit."
          else
            git commit -m "chore: bump tracked pydantic-ai version to ${NEW}"
          fi
          git push origin "$BRANCH" --force

          OLD="$OLD" \
          NEW_VERSION="$NEW" \
          SUMMARY="$(cat /tmp/release-summary.md)" \
          python3 .github/scripts/create-pr-body.py

          PR_BODY=$(cat /tmp/pr-body.md)
          RESPONSE=$(gh api repos/${{ github.repository }}/pulls \
              --method POST \
              --field title="chore: port pydantic-ai v${NEW} changes" \
              --field head="$BRANCH" \
              --field base="main" \
              --field body="$PR_BODY" \
              --field labels[]="pydantic-ai-update")
          PR_NUMBER=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['number'])")
          PR_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['html_url'])")
          echo "Opened PR: $PR_URL"

          # Assign Copilot coding agent to the PR (requires Copilot coding agent enabled + added as assignable in repo settings)
          gh pr edit "${PR_NUMBER}" --repo ${{ github.repository }} --add-assignee copilot \
            || echo "Copilot not assignable — go to repo Settings → Copilot → Coding agent to enable it."

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
